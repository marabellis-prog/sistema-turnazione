name: Deploy su GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Installa dipendenze
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Deploy su gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          force_orphan: true

      # Attende che la nuova versione sia effettivamente servita da GitHub Pages.
      # peaceiris/actions-gh-pages fa solo commit su gh-pages: GitHub poi ha
      # bisogno di tempo per propagare via Fastly (30-90s). Senza questa attesa
      # il badge arriverebbe prima che il sito sia raggiungibile.
      - name: Attende propagazione GitHub Pages
        run: |
          EXPECTED_SHA="${GITHUB_SHA:0:7}"
          URL="https://marabellis-prog.github.io/sistema-turnazione/"
          echo "Aspetto che '$EXPECTED_SHA' compaia sul sito..."
          for i in $(seq 1 60); do
            # Aggiunge query param univoco per bypassare cache CDN ad ogni tentativo
            BODY=$(curl -fsS "$URL?_check=$(date +%s%N)" 2>/dev/null || true)
            JS_URL=$(echo "$BODY" | grep -oE '/sistema-turnazione/assets/index-[A-Za-z0-9_-]+\.js' | head -1)
            if [ -n "$JS_URL" ]; then
              JS_BODY=$(curl -fsS "https://marabellis-prog.github.io$JS_URL?_check=$(date +%s%N)" 2>/dev/null || true)
              if echo "$JS_BODY" | grep -q "$EXPECTED_SHA"; then
                echo "✓ Versione $EXPECTED_SHA live dopo $((i*5))s"
                exit 0
              fi
            fi
            echo "  tentativo $i/60 — non ancora pronto, attendo 5s…"
            sleep 5
          done
          echo "⚠ Timeout: notifico comunque (deploy potrebbe essere live a breve)"

      # Aggiorna app_version in Supabase → tutti i client connessi ricevono
      # la notifica real-time via WebSocket e mostrano il badge "Aggiornamento disponibile".
      # Richiede il secret SUPABASE_SERVICE_ROLE_KEY (Settings → Secrets → Actions).
      - name: Notifica nuova versione via Supabase Realtime
        run: |
          curl -s -o /dev/null -w "%{http_code}" -X PATCH \
            "${{ secrets.VITE_SUPABASE_URL }}/rest/v1/app_version?id=eq.1" \
            -H "apikey: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            -H "Content-Type: application/json" \
            -H "Prefer: return=minimal" \
            -d "{\"ts\": $(date +%s%3N)}"
