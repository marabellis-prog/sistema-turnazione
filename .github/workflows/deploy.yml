name: Deploy su GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Installa dipendenze
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          # OAuth Client ID (Web) per la sincronizzazione Google Calendar.
          # E' un valore pubblico (finisce nel bundle): nessun rischio a esporlo.
          VITE_GOOGLE_OAUTH_CLIENT_ID: ${{ secrets.VITE_GOOGLE_OAUTH_CLIENT_ID }}

      - name: Deploy su gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          force_orphan: true

      # ─── PHASE 1: origin pronto ──────────────────────────────────
      # peaceiris fa solo commit su gh-pages; GitHub Pages poi pubblica.
      # Verifichiamo con query string univoca (bypassa cache CDN → forza
      # fetch dall'origin) che il nuovo bundle sia effettivamente servito.
      - name: Phase 1 — Attende che l'origin sia pronto
        run: |
          EXPECTED_SHA="${GITHUB_SHA:0:7}"
          URL="https://marabellis-prog.github.io/sistema-turnazione/"
          echo "Aspetto che '$EXPECTED_SHA' sia disponibile dall'origin..."
          for i in $(seq 1 60); do
            BODY=$(curl -fsS "$URL?_check=$(date +%s%N)" 2>/dev/null || true)
            JS_URL=$(echo "$BODY" | grep -oE '/sistema-turnazione/assets/index-[A-Za-z0-9_-]+\.js' | head -1)
            if [ -n "$JS_URL" ]; then
              JS_BODY=$(curl -fsS "https://marabellis-prog.github.io$JS_URL?_check=$(date +%s%N)" 2>/dev/null || true)
              if echo "$JS_BODY" | grep -q "$EXPECTED_SHA"; then
                echo "✓ Origin pronto: $EXPECTED_SHA dopo $((i*5))s"
                exit 0
              fi
            fi
            echo "  tentativo $i/60 — non ancora pronto, attendo 5s…"
            sleep 5
          done
          echo "⚠ Timeout phase 1 — notifico comunque"

      # ─── PHASE 2: purge CDN propagato ─────────────────────────────
      # L'origin è pronto (phase 1) ma il CDN Fastly può ancora servire
      # l'HTML VECCHIO per URL nuda (senza query string) finché il purge
      # non si propaga fra i PoP. Senza questa attesa, l'utente che fa
      # Ctrl+F5 — o anche solo apre il sito — riceve la versione vecchia
      # nonostante il badge sia comparso.
      # Qui pollianmo l'URL nuda (come farebbe il browser dell'utente)
      # finché restituisce il nuovo bundle, indicando che il CDN ha
      # invalidato la cache stale.
      - name: Phase 2 — Attende propagazione purge CDN (URL nuda)
        run: |
          EXPECTED_SHA="${GITHUB_SHA:0:7}"
          URL="https://marabellis-prog.github.io/sistema-turnazione/"
          echo "Verifico che URL nuda restituisca $EXPECTED_SHA (post-purge)..."
          for i in $(seq 1 60); do
            # NIENTE query string: testiamo esattamente quello che vede
            # il browser dell'utente quando fa refresh.
            BODY=$(curl -fsS -H "Cache-Control: no-cache, no-store" "$URL" 2>/dev/null || true)
            JS_URL=$(echo "$BODY" | grep -oE '/sistema-turnazione/assets/index-[A-Za-z0-9_-]+\.js' | head -1)
            if [ -n "$JS_URL" ]; then
              JS_BODY=$(curl -fsS -H "Cache-Control: no-cache, no-store" "https://marabellis-prog.github.io$JS_URL" 2>/dev/null || true)
              if echo "$JS_BODY" | grep -q "$EXPECTED_SHA"; then
                echo "✓ URL nuda ora serve $EXPECTED_SHA dopo $((i*5))s — CDN propagato"
                exit 0
              fi
            fi
            echo "  tentativo $i/60 — CDN ancora con vecchio, attendo 5s…"
            sleep 5
          done
          echo "⚠ Timeout phase 2 — il client farà polling autonomo"

      # Aggiorna app_version in Supabase → tutti i client connessi ricevono
      # la notifica real-time via WebSocket e mostrano il badge "Aggiornamento disponibile".
      # Richiede il secret SUPABASE_SERVICE_ROLE_KEY (Settings → Secrets → Actions).
      - name: Notifica nuova versione via Supabase Realtime
        run: |
          curl -s -o /dev/null -w "%{http_code}" -X PATCH \
            "${{ secrets.VITE_SUPABASE_URL }}/rest/v1/app_version?id=eq.1" \
            -H "apikey: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            -H "Content-Type: application/json" \
            -H "Prefer: return=minimal" \
            -d "{\"ts\": $(date +%s%3N)}"
