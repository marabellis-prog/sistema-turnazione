name: Deploy su GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Installa dipendenze
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Deploy su gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          force_orphan: true

      # Aggiorna app_version in Supabase → tutti i client connessi ricevono
      # la notifica real-time via WebSocket e mostrano il badge "Aggiornamento disponibile".
      # Richiede il secret SUPABASE_SERVICE_ROLE_KEY (Settings → Secrets → Actions).
      - name: Notifica nuova versione via Supabase Realtime
        run: |
          curl -s -o /dev/null -w "%{http_code}" -X PATCH \
            "${{ secrets.VITE_SUPABASE_URL }}/rest/v1/app_version?id=eq.1" \
            -H "apikey: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            -H "Content-Type: application/json" \
            -H "Prefer: return=minimal" \
            -d "{\"ts\": $(date +%s%3N)}"
