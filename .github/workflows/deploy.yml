name: Deploy su GitHub Pages

# METODO UFFICIALE GitHub Actions (dal 02/07/2026).
#
# Prima si usava peaceiris/actions-gh-pages → push sul branch gh-pages → la
# pipeline NATIVA "pages build and deployment" pubblicava. Quel percorso, il
# 02/07/2026, ha iniziato a fallire in modo persistente con
# "Timeout reached, aborting!" nello step deploy-pages (default 10 min), che
# NON è configurabile perché generato da GitHub. Passando al deploy diretto via
# artifact possiamo alzare il timeout (backend Pages lento ma non fermo) ed
# eliminare l'indirezione branch→pipeline nativa.

on:
  push:
    branches: [ main ]
  workflow_dispatch:

# Permessi richiesti dal deploy ufficiale Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Un solo deploy Pages alla volta (non cancellare quello in corso).
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # ── Build del sito statico + upload artifact ────────────────────────
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Installa dipendenze
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          # OAuth Client ID (Web) per la sincronizzazione Google Calendar.
          # E' un valore pubblico (finisce nel bundle): nessun rischio a esporlo.
          VITE_GOOGLE_OAUTH_CLIENT_ID: ${{ secrets.VITE_GOOGLE_OAUTH_CLIENT_ID }}

      # Configura Pages e, se serve, commuta la sorgente a "GitHub Actions"
      # (enablement: true) — cosi' non serve toccare Settings a mano.
      - name: Configura Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      # SPA: niente Jekyll. Carica ./dist come artifact Pages.
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  # ── Deploy dell'artifact su Pages ───────────────────────────────────
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy su GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        with:
          # Default 600000 (10 min): troppo poco quando il backend Pages e'
          # lento. Alziamo a 20 min per lasciar completare il deployment.
          timeout: 1200000

      # Aggiorna app_version in Supabase → tutti i client connessi ricevono la
      # notifica real-time via WebSocket e mostrano il badge "Aggiornamento
      # disponibile". Solo DOPO un deploy riuscito (step precedente ok).
      - name: Notifica nuova versione via Supabase Realtime
        run: |
          curl -s -o /dev/null -w "%{http_code}" -X PATCH \
            "${{ secrets.VITE_SUPABASE_URL }}/rest/v1/app_version?id=eq.1" \
            -H "apikey: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            -H "Content-Type: application/json" \
            -H "Prefer: return=minimal" \
            -d "{\"ts\": $(date +%s%3N)}"
