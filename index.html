<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sistema Turnazione</title>
    <meta name="description" content="Gestione turni medici" />

    <!-- Favicon browser desktop -->
    <link rel="icon" type="image/svg+xml" href="/sistema-turnazione/favicon.svg" />

    <!-- ── Auto-aggiornamento: rileva nuovi deploy e ricarica ───────
         Ad ogni caricamento scarica version.json (mai in cache).
         Se il timestamp è diverso dall'ultimo noto → svuota i cache
         del Service Worker e ricarica la pagina.
    ──────────────────────────────────────────────────────────────── -->
    <script>
      ;(function () {
        var KEY  = 'app_version'
        var BASE = '/sistema-turnazione'
        fetch(BASE + '/version.json?nc=' + Date.now(), { cache: 'no-store' })
          .then(function (r) { return r.json() })
          .then(function (v) {
            var ts   = String(v.ts)
            var prev = localStorage.getItem(KEY)
            localStorage.setItem(KEY, ts)
            if (prev && prev !== ts) {
              // Nuovo deploy: svuota tutti i cache SW poi ricarica
              var doReload = function () { location.reload() }
              if (window.caches) {
                caches.keys()
                  .then(function (keys) {
                    return Promise.all(keys.map(function (k) { return caches.delete(k) }))
                  })
                  .then(doReload)
                  .catch(doReload)
              } else {
                doReload()
              }
            }
          })
          .catch(function () { /* offline o 404: ignora */ })
      })()
    </script>

    <!-- iOS / iPadOS — "Aggiungi a schermata Home" -->
    <link rel="apple-touch-icon" sizes="180x180" href="/sistema-turnazione/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Turni" />

    <!-- Android / PWA -->
    <link rel="manifest" href="/sistema-turnazione/manifest.json" />
    <meta name="theme-color" content="#374f30" />
    <style>
      /* Previene FOUC */
      body { margin: 0; background: #f9fafb; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
