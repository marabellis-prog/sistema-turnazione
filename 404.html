<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sistema Turnazione</title>
    <script>
      // GitHub Pages SPA redirect trick
      // Salva il path e lo ripristina dopo il caricamento dell'app
      const path = window.location.pathname.replace('/sistema-turnazione', '');
      const search = window.location.search;
      const hash = window.location.hash;
      sessionStorage.setItem('redirect', path + search + hash);
      window.location.replace('/sistema-turnazione/');
    </script>
  </head>
  <body></body>
</html>
